name: SideStore source

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sidestore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA & prepare source
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Pod install (force HTTPS for git submodules)
        run: |
          set -x
          git config --global --unset-all url."https://github.com/".insteadOf || true
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git://github.com/"
          pod install --repo-update

      - name: Build (device arm64, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace seafilePro.xcworkspace \
            -scheme seafile-appstore \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENABLE_BITCODE=NO

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)
          echo "App: $APP_PATH"
          rm -rf Payload dist
          mkdir -p Payload dist
          cp -R "$APP_PATH" Payload/
          zip -qry dist/Seafile.ipa Payload
          ls -l dist

      - name: Extract metadata
        id: meta
        run: |
          set -e
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)
          PLIST="$APP_PATH/Info.plist"
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "1.0")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST" 2>/dev/null || echo "1")
          MINOS=$(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" 2>/dev/null || echo "14.0")
          SIZE=$(stat -f%z dist/Seafile.ipa)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "minos=$MINOS" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Publish IPA to a stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ipa-latest
          name: Latest unsigned IPA
          body: Automated unsigned build for SideStore. Re-signed on-device by SideStore.
          files: dist/Seafile.ipa
          fail_on_unmatched_files: true

      - name: Generate SideStore source (apps.json + index.html)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BUILDV: ${{ steps.meta.outputs.build }}
          MINOS: ${{ steps.meta.outputs.minos }}
          SIZE: ${{ steps.meta.outputs.size }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -e
          mkdir -p _site
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)
          ICON=$(ls -S "$APP_PATH"/AppIcon*.png 2>/dev/null | head -n1 || true)
          if [ -n "$ICON" ]; then cp "$ICON" _site/icon.png; export ICON_URL="https://$OWNER.github.io/$REPO_NAME/icon.png"; else export ICON_URL=""; fi
          python3 - <<'PY'
          import json, os, datetime
          owner = os.environ["OWNER"]
          repo_name = os.environ["REPO_NAME"]
          repo = os.environ["REPO"]
          source = {
              "name": "Seafile (unofficial build)",
              "identifier": "com.%s.seafile-ios.source" % owner.lower(),
              "sourceURL": "https://%s.github.io/%s/apps.json" % (owner, repo_name),
              "apps": [{
                  "name": "Seafile",
                  "bundleIdentifier": "com.seafile.seafilePro",
                  "developerName": "Seafile / built by %s" % owner,
                  "subtitle": "Self-hosted file sync & share client",
                  "localizedDescription": "Unofficial unsigned build of the Seafile iOS client, packaged for SideStore. SideStore re-signs it on-device with your own account.",
                  "iconURL": os.environ.get("ICON_URL", ""),
                  "tintColor": "F39C12",
                  "category": "utilities",
                  "screenshots": [],
                  "versions": [{
                      "version": os.environ.get("VERSION", "1.0"),
                      "buildVersion": os.environ.get("BUILDV", "1"),
                      "date": datetime.datetime.utcnow().strftime("%Y-%m-%d"),
                      "localizedDescription": "Automated unsigned build from CI.",
                      "downloadURL": "https://github.com/%s/releases/download/ipa-latest/Seafile.ipa" % repo,
                      "size": int(os.environ.get("SIZE", "0")),
                      "minOSVersion": os.environ.get("MINOS", "14.0")
                  }]
              }],
              "news": []
          }
          with open("_site/apps.json", "w") as f:
              json.dump(source, f, indent=2)
          url = source["sourceURL"]
          html = "<!doctype html><meta charset=utf-8><title>Seafile SideStore Source</title><h1>Seafile SideStore Source</h1><p>Add this URL in SideStore &rarr; Sources:</p><pre>%s</pre><p><a href=\"apps.json\">apps.json</a> &middot; <a href=\"https://github.com/%s/releases/tag/ipa-latest\">latest .ipa</a></p>" % (url, repo)
          with open("_site/index.html", "w") as f:
              f.write(html)
          PY
          echo "--- apps.json ---"
          cat _site/apps.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
